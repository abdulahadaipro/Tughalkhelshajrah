<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tughal Khel | Digital Heritage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        .glass-sidebar { background: rgba(26, 31, 54, 0.95); backdrop-filter: blur(10px); transition: 0.3s ease-in-out; }
        .urdu-font { direction: rtl; font-family: 'Segoe UI', Tahoma; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
        .sidebar-active { background: #2d3748; border-left: 4px solid #60a5fa; }

        @media (max-width: 768px) {
            .glass-sidebar { position: fixed; left: -100%; top: 0; height: 100%; width: 280px; z-index: 50; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .sidebar-open { left: 0; }
            #profileView h2 { font-size: 1.5rem; }
        }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
        #overlay.active { display: block; }
        
        /* Image upload button styling */
        input[type="file"]::file-selector-button {
            background: #2563eb; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="w-80 glass-sidebar text-white flex flex-col z-50">
        <div class="p-6 border-b border-gray-700 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold tracking-widest text-blue-400 uppercase">Tughal Khel</h1>
                <p class="text-[10px] text-gray-400">Heritage Vault</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="p-4 border-b border-gray-800">
            <input type="text" id="sidebarSearch" placeholder="Search..." class="w-full bg-gray-800 text-sm border border-gray-600 p-2 rounded-lg outline-none text-white">
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4" id="sidebarList"></div>

        <div class="p-4 border-t border-gray-700">
            <button onclick="openModal()" class="w-full bg-blue-600 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-bold shadow-lg">
                <i class="fas fa-plus-circle"></i> Add New
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10">
            <button onclick="toggleSidebar()" class="md:hidden text-gray-600 text-xl"><i class="fas fa-bars"></i></button>
            <div class="text-gray-500 italic text-xs truncate max-w-[200px]"><span id="breadCrumb">Select member</span></div>
            <span class="text-[10px] font-semibold bg-green-100 text-green-700 px-2 py-1 rounded-full">VERIFIED</span>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center text-gray-400">
                <i class="fas fa-users text-5xl mb-4 opacity-20"></i>
                <h2 class="text-xl">Select a Family Branch</h2>
            </div>

            <div id="profileView" class="hidden max-w-2xl mx-auto pb-10">
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                    <div class="h-20 bg-gradient-to-r from-blue-600 to-indigo-800"></div>
                    <div class="px-6 pb-6 relative">
                        <div class="absolute -top-10 left-6">
                            <img id="viewImg" src="" class="w-20 h-20 rounded-xl border-4 border-white shadow-md object-cover bg-gray-100">
                        </div>
                        <div class="flex justify-end gap-2 pt-4">
                            <button id="editBtn" class="text-blue-600 p-2 bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button id="deleteBtn" class="text-red-600 p-2 bg-red-50 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="pt-8">
                            <h2 class="text-2xl font-bold text-gray-800" id="viewEngName"></h2>
                            <p class="text-lg text-gray-500 urdu-font" id="viewUrduName"></p>
                            <p class="mt-2 inline-block text-blue-600 bg-blue-50 px-2 py-1 rounded text-[10px] font-bold uppercase" id="viewRole"></p>
                        </div>
                    </div>
                </div>
                <div id="descendantsContainer" class="mt-6"></div>
            </div>
        </main>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-xl overflow-hidden shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modalTitle" class="font-bold text-gray-800">Add Member</h3>
                <button onclick="closeModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-5 space-y-4 max-h-[70vh] overflow-y-auto">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="inEng" placeholder="English Name" class="border p-2 rounded text-sm outline-none focus:border-blue-500">
                    <input type="text" id="inUrdu" placeholder="اردو نام" class="border p-2 rounded text-sm urdu-font text-right outline-none focus:border-blue-500">
                </div>
                <input type="text" id="inLineage" placeholder="Lineage (Son of...)" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-500">
                
                <div class="flex items-center gap-3 bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <div id="imagePreview" class="w-12 h-12 rounded bg-white border flex items-center justify-center overflow-hidden shrink-0">
                        <i class="fas fa-camera text-gray-300"></i>
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase block mb-1">Upload Photo</label>
                        <input type="file" id="inPhoto" accept="image/*" onchange="handleImage(event)" class="text-[10px] w-full">
                    </div>
                </div>

                <textarea id="inChildren" rows="2" placeholder="Descendants (Comma separated)" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-500"></textarea>
                <button onclick="saveRecord()" id="saveBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('TughalVaultFinal')) || [
            { id: 1, eng: "Tughal Khan", urdu: "طغل خان", lineage: "Founder", img: "", sons: ["Bajal", "Kamal", "Sadrak", "Deegan"] }
        ];
        let currentEditId = null;
        let tempImage = "";

        function toggleSidebar() {
            document.querySelector('.glass-sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                tempImage = event.target.result;
                document.getElementById('imagePreview').innerHTML = `<img src="${tempImage}" class="w-full h-full object-cover">`;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function refreshUI() {
            localStorage.setItem('TughalVaultFinal', JSON.stringify(db));
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';
            db.forEach(m => {
                const div = document.createElement('div');
                div.className = 'sidebar-item p-3 mb-1 rounded-lg cursor-pointer flex items-center gap-3 border border-transparent';
                div.innerHTML = `<div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-[10px] font-bold">${m.eng[0]}</div>
                                 <div class="flex-1 overflow-hidden"><div class="text-xs font-bold truncate">${m.eng}</div><div class="text-[9px] text-gray-400 urdu-font truncate">${m.urdu}</div></div>`;
                div.onclick = () => { showProfile(m); if(window.innerWidth < 768) toggleSidebar(); };
                list.appendChild(div);
            });
        }

        function showProfile(m) {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
            document.getElementById('viewEngName').innerText = m.eng;
            document.getElementById('viewUrduName').innerText = `(${m.urdu})`;
            document.getElementById('viewRole').innerText = m.lineage;
            document.getElementById('viewImg').src = m.img || "https://www.w3schools.com/howto/img_avatar.png";
            document.getElementById('breadCrumb').innerText = m.eng;
            
            const container = document.getElementById('descendantsContainer');
            container.innerHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h4 class="text-[10px] font-bold text-blue-500 uppercase mb-3 border-b pb-1">Descendants</h4>
                <ul class="space-y-1">${m.sons.map(s => `<li class="text-xs bg-gray-50 p-2 rounded"><i class="fas fa-caret-right mr-2 text-blue-300"></i>${s}</li>`).join('')}</ul>
            </div>`;

            document.getElementById('editBtn').onclick = () => openModal(m);
            document.getElementById('deleteBtn').onclick = () => { if(confirm("Delete?")) { db = db.filter(x => x.id !== m.id); refreshUI(); location.reload(); }};
        }

        function openModal(m = null) {
            currentEditId = m ? m.id : null;
            tempImage = m ? m.img : "";
            document.getElementById('inEng').value = m ? m.eng : '';
            document.getElementById('inUrdu').value = m ? m.urdu : '';
            document.getElementById('inLineage').value = m ? m.lineage : '';
            document.getElementById('inChildren').value = m ? m.sons.join(', ') : '';
            document.getElementById('imagePreview').innerHTML = tempImage ? `<img src="${tempImage}" class="w-full h-full object-cover">` : '<i class="fas fa-camera text-gray-300"></i>';
            document.getElementById('addModal').classList.remove('hidden');
        }

        function saveRecord() {
            const eng = document.getElementById('inEng').value;
            const urdu = document.getElementById('inUrdu').value;
            if(!eng || !urdu) return alert("Fill required fields");

            const data = {
                id: currentEditId || Date.now(),
                eng, urdu, 
                lineage: document.getElementById('inLineage').value,
                img: tempImage,
                sons: document.getElementById('inChildren').value.split(',').map(s => s.trim()).filter(s => s)
            };

            if(currentEditId) db[db.findIndex(x => x.id === currentEditId)] = data;
            else db.unshift(data);
            
            refreshUI(); closeModal(); showProfile(data);
        }

        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        refreshUI();
    </script>
</body>
</html>
