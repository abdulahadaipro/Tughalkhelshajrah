<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tughal Khel | Digital Heritage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
        }
        .glass-sidebar {
            background: rgba(26, 31, 54, 0.95);
            backdrop-filter: blur(10px);
            transition: 0.3s ease-in-out;
        }
        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .urdu-font {
            direction: rtl;
            font-family: 'Segoe UI', Tahoma;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 10px;
        }
        .sidebar-active {
            background: #2d3748;
            border-left: 4px solid #60a5fa;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .glass-sidebar {
                position: fixed;
                left: -100%; /* Shuru mein chhupa hua */
                top: 0;
                height: 100%;
                width: 280px;
                z-index: 50;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            
            .sidebar-open {
                left: 0; /* Button dabane par bahar aa jayega */
            }

            header {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            main {
                padding: 1rem;
            }

            .max-w-4xl {
                width: 100%;
            }
            
            #profileView h2 {
                font-size: 1.875rem; 
            }

            #viewImg {
                width: 100px;
                height: 100px;
            }
        }

        /* Overlay for mobile when sidebar is open */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }
        #overlay.active {
            display: block;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="w-80 glass-sidebar text-white flex flex-col z-50">
        <div class="p-8 border-b border-gray-700 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-widest text-blue-400 uppercase">Tughal Khel</h1>
                <p class="text-xs text-gray-400 mt-1">Heritage Vault</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <div class="p-4 border-b border-gray-800">
            <input type="text" id="sidebarSearch" placeholder="Search member..." class="w-full bg-gray-800 text-sm border border-gray-600 p-3 rounded-lg outline-none focus:border-blue-500 text-white placeholder-gray-400">
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4" id="sidebarList">
            </div>

        <div class="p-4 border-t border-gray-700">
            <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition duration-300 flex items-center justify-center gap-2 font-bold shadow-lg">
                <i class="fas fa-plus-circle"></i> Add New Record
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-10 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600 text-2xl">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="text-gray-500 italic text-sm truncate max-w-[150px] md:max-w-none">
                    Lineage: <span id="breadCrumb" class="font-semibold text-gray-700">Select member</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="dataCount" class="hidden md:inline text-xs font-bold text-gray-400"></span>
                <span class="text-[10px] md:text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Verified</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-5 md:p-10">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center text-gray-400">
                <i class="fas fa-users text-6xl mb-4 opacity-20"></i>
                <h2 class="text-2xl">Select a Family Branch</h2>
                <p class="mt-2 px-4">Click on any name from the sidebar to view their full profile.</p>
            </div>

            <div id="profileView" class="hidden max-w-4xl mx-auto pb-20">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-8 relative border border-gray-100">
                    <div class="h-24 md:h-32 bg-gradient-to-r from-blue-600 to-indigo-800"></div>
                    <div class="px-6 md:px-10 pb-10 relative">
                        <div class="absolute -top-12 md:-top-16 left-6 md:left-10">
                            <img id="viewImg" src="https://via.placeholder.com/150" class="w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 border-white shadow-lg object-cover bg-gray-200">
                        </div>
                        
                        <div class="absolute top-4 right-4 md:top-6 md:right-10 flex gap-2">
                            <button id="editBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-600 p-2 md:p-3 rounded-xl transition shadow-sm">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button id="deleteBtn" class="bg-red-50 hover:bg-red-100 text-red-600 p-2 md:p-3 rounded-xl transition shadow-sm">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>

                        <div class="pt-16 md:pt-20">
                            <h2 class="text-2xl md:text-4xl font-bold text-gray-800" id="viewEngName">Name</h2>
                            <p class="text-xl md:text-2xl text-gray-500 mt-1 urdu-font" id="viewUrduName">(نام)</p>
                            <p class="mt-4 inline-block text-blue-600 bg-blue-50 px-3 py-1 rounded-md font-semibold uppercase tracking-widest text-[10px] md:text-xs" id="viewRole">Branch Head</p>
                        </div>
                    </div>
                </div>

                <div id="descendantsContainer" class="grid grid-cols-1 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modalTitle" class="font-bold text-lg text-gray-800">Add Family Member</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">English Name</label>
                        <input type="text" id="inEng" class="w-full border-2 border-gray-200 p-2 rounded-lg outline-none focus:border-blue-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase block text-right">اردو نام</label>
                        <input type="text" id="inUrdu" class="w-full border-2 border-gray-200 p-2 rounded-lg outline-none focus:border-blue-500 urdu-font text-right">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase">Lineage / Role</label>
                    <input type="text" id="inLineage" placeholder="e.g. Son of Saeed Khan" class="w-full border-2 border-gray-200 p-2 rounded-lg outline-none focus:border-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase">Descendants (Comma separated)</label>
                    <textarea id="inChildren" rows="3" placeholder="Ali, Raza, Usman" class="w-full border-2 border-gray-200 p-2 rounded-lg outline-none focus:border-blue-500"></textarea>
                </div>
                <button onclick="saveRecord()" id="saveBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">Save Record</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('TughalVaultFinal')) || [
            { id: 1, eng: "Tughal Khan", urdu: "طغل خان", lineage: "Founder (1878)", img: "https://www.w3schools.com/howto/img_avatar.png", sons: ["Bajal (بجل)", "Kamal (کمال)", "Sadrak Khan (صدرک خان)", "Deegan (دیگان)"] }
        ];
        let currentEditId = null;

        function toggleSidebar() {
            const sidebar = document.querySelector('.glass-sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('active');
        }

        function refreshUI() {
            localStorage.setItem('TughalVaultFinal', JSON.stringify(db));
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';
            db.forEach(member => {
                const div = document.createElement('div');
                div.className = 'sidebar-item p-3 mb-2 rounded-xl cursor-pointer hover:bg-gray-800 transition flex items-center gap-3 border border-transparent';
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold text-blue-400 overflow-hidden shrink-0">
                        ${member.eng[0]}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="text-sm font-semibold truncate text-gray-200">${member.eng}</div>
                        <div class="text-[10px] text-gray-500 urdu-font truncate">${member.urdu}</div>
                    </div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('sidebar-active'));
                    div.classList.add('sidebar-active');
                    showProfile(member);
                    if(window.innerWidth <= 768) toggleSidebar();
                };
                list.appendChild(div);
            });
            document.getElementById('dataCount').innerText = `${db.length} Records`;
        }

        function showProfile(m) {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
            document.getElementById('viewEngName').innerText = m.eng;
            document.getElementById('viewUrduName').innerText = `(${m.urdu})`;
            document.getElementById('viewRole').innerText = m.lineage;
            document.getElementById('breadCrumb').innerText = m.eng;
            
            const container = document.getElementById('descendantsContainer');
            container.innerHTML = `
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h4 class="text-xs font-bold text-blue-500 uppercase mb-4 border-b pb-2">Descendants</h4>
                    <ul class="space-y-2">
                        ${m.sons.map(s => `<li class="text-gray-700 bg-gray-50 p-2 rounded-lg text-sm border border-gray-100"><i class="fas fa-chevron-right text-[10px] mr-2 text-gray-300"></i>${s}</li>`).join('')}
                    </ul>
                </div>
            `;

            document.getElementById('editBtn').onclick = () => openModal(m);
            document.getElementById('deleteBtn').onclick = () => {
                if(confirm("Delete this record?")) { db = db.filter(x => x.id !== m.id); refreshUI(); location.reload(); }
            };
        }

        function saveRecord() {
            const eng = document.getElementById('inEng').value;
            const urdu = document.getElementById('inUrdu').value;
            const lineage = document.getElementById('inLineage').value;
            const sonsRaw = document.getElementById('inChildren').value;

            if(!eng || !urdu) return alert("Names required");

            const data = {
                id: currentEditId || Date.now(),
                eng, urdu, lineage,
                sons: sonsRaw ? sonsRaw.split(',').map(s => s.trim()) : []
            };

            if(currentEditId) {
                db[db.findIndex(x => x.id === currentEditId)] = data;
            } else {
                db.unshift(data);
            }
            refreshUI(); closeModal(); showProfile(data);
        }

        function openModal(m = null) {
            currentEditId = m ? m.id : null;
            if(m) {
                document.getElementById('inEng').value = m.eng;
                document.getElementById('inUrdu').value = m.urdu;
                document.getElementById('inLineage').value = m.lineage;
                document.getElementById('inChildren').value = m.sons.join(', ');
            } else {
                document.querySelectorAll('#addModal input, #addModal textarea').forEach(i => i.value = '');
            }
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        document.getElementById('sidebarSearch').onkeyup = function() {
            const val = this.value.toLowerCase();
            const items = document.getElementById('sidebarList').children;
            db.forEach((m, i) => {
                items[i].style.display = (m.eng.toLowerCase().includes(val) || m.urdu.includes(val)) ? 'flex' : 'none';
            });
        };

        refreshUI();
    </script>
</body>
</html>
