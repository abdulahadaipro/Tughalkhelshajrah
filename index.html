<html lang="en">

        /* Dynamic Sidebar for Desktop & Mobile */
        .sidebar { 
            background-color: #1e293b; 
            color: white; 
            z-index: 50; 
            overflow-y: auto; 
            transition: all 0.3s ease;
        }

        @media (min-width: 1024px) {
            .sidebar { height: 100vh; position: fixed; width: 320px; }
            .main-content { margin-left: 320px; padding: 2rem; }
        }

        @media (max-width: 1023px) {
            .sidebar { position: relative; width: 100%; height: auto; border-bottom: 1px solid #334155; }
            .main-content { margin-left: 0; padding: 1rem; }
            #sidebarList { display: flex; overflow-x: auto; padding: 1rem; white-space: nowrap; gap: 10px; }
            #sidebarList > button { width: auto; min-width: 160px; margin-bottom: 0; }
        }

        .hidden { display: none !important; }
        
        .profile-banner { background-color: #1a1f2c; height: 180px; position: relative; border-radius: 1.5rem 1.5rem 0 0; }
        @media (min-width: 768px) { .profile-banner { height: 240px; border-radius: 2rem 2rem 0 0; } }

        .profile-card-container { margin-top: -60px; position: relative; z-index: 10; padding: 0 1rem; }
        @media (min-width: 768px) { .profile-card-container { margin-top: -80px; padding: 0 3rem; } }

        .profile-main-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        @media (min-width: 768px) { .profile-main-card { border-radius: 2.5rem; padding: 3rem; } }

        /* Tree View Responsive Scroll */
        #treeView { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tree ul { padding-top: 20px; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 20px 5px 0 5px; transition: all 0.3s; }
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #cbd5e1; width: 50%; height: 20px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #cbd5e1; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li a { border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 10px; background: white; color: #1e293b; display: inline-block; font-size: 10px; font-weight: 800; white-space: nowrap; }
        
        #profileImgDisplay { object-fit: cover; border-radius: 1.5rem; width: 100%; height: 100%; }
    </style>

        let activeProfileId = null;

        function showSection(sectionId) {
            ['dashboard', 'addRecord', 'profileView', 'treeView'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function showProfile(id) {
            activeProfileId = id;
            showSection('profileView');
            const m = familyData[id];
            document.getElementById('engName').innerText = m.name;
            document.getElementById('urduName').innerText = m.urdu;
            document.getElementById('bIdTag').innerText = m.bId;
            document.getElementById('bio').innerText = m.bio || "No biography provided.";
            
            const initialBox = document.getElementById('profInitial');
            const imgBox = document.getElementById('profileImgDisplay');
            
            if(m.image) {
                imgBox.src = m.image;
                imgBox.classList.remove('hidden');
                initialBox.innerText = "";
            } else {
                imgBox.classList.add('hidden');
                initialBox.innerText = m.name.charAt(0);
            }

            document.getElementById('editBtn').onclick = () => editMember(id);
            document.getElementById('deleteBtn').onclick = () => deleteMember(id);
            
            const cList = document.getElementById('childList');
            cList.innerHTML = "";
            const children = Object.values(familyData).filter(c => c.parent === id);
            
            if(children.length === 0) {
                cList.innerHTML = "<p class='text-[10px] text-slate-400 italic'>No descendants registered.</p>";
            } else {
                children.forEach(c => {
                    const d = document.createElement('div');
                    d.className = "p-4 bg-white rounded-xl border border-slate-100 flex justify-between items-center group cursor-pointer hover:shadow-md transition-all";
                    d.onclick = () => showProfile(c.id);
                    d.innerHTML = `
                        <div>
                            <p class="text-xs font-black text-slate-800">${c.name}</p>
                            <p class="text-[8px] text-blue-500 font-bold uppercase">View Profile</p>
                        </div>
                        <i class="fas fa-chevron-right text-slate-300 group-hover:text-blue-500 transition-colors"></i>
                    `;
                    cList.appendChild(d);
                });
            }
        }

        function uploadProfileImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    familyData[activeProfileId].image = e.target.result;
                    showProfile(activeProfileId);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveMember() {
            const id = document.getElementById('editId').value || `ID-${Date.now()}`;
            const existingImage = familyData[id] ? familyData[id].image : null;
            
            familyData[id] = {
                id: id,
                name: document.getElementById('newName').value,
                urdu: document.getElementById('newUrdu').value,
                parent: document.getElementById('parentSelect').value || null,
                bio: document.getElementById('newBio').value,
                bId: `#${id.split('-')[1] || id}`,
                image: existingImage
            };
            
            renderSidebar();
            showProfile(id);
        }

        function editMember(id) {
            const m = familyData[id];
            document.getElementById('editId').value = m.id;
            document.getElementById('newName').value = m.name;
            document.getElementById('newUrdu').value = m.urdu;
            document.getElementById('parentSelect').value = m.parent;
            document.getElementById('newBio').value = m.bio;
            document.getElementById('formHeader').innerText = "Edit Member Record";
            showSection('addRecord');
        }

        function deleteMember(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                delete familyData[id];
                renderSidebar();
                showSection('dashboard');
            }
        }

        function resetForm() {
            document.getElementById('recordForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formHeader').innerText = "Register New Member";
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarList');
            list.innerHTML = "";
            Object.values(familyData).forEach(m => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 lg:p-4 rounded-xl hover:bg-slate-800 transition-all group flex items-center space-x-4 mb-1 text-slate-400 shrink-0 lg:shrink";
                btn.onclick = () => showProfile(m.id);
                btn.innerHTML = `
                    <div class="w-8 h-8 lg:w-10 lg:h-10 bg-slate-800 rounded-lg lg:rounded-xl flex items-center justify-center text-[10px] lg:text-xs font-black group-hover:bg-blue-600 group-hover:text-white transition-all shrink-0">${m.name.charAt(0)}</div>
                    <div>
                        <p class="text-[10px] lg:text-[11px] font-bold group-hover:text-white">${m.name}</p>
                        <p class="text-[7px] lg:text-[8px] uppercase font-black opacity-40 tracking-tighter">${m.bId}</p>
                    </div>
                `;
                list.appendChild(btn);
            });
            document.getElementById('statCount').innerText = Object.keys(familyData).length;
            populateParentSelect();
        }

        function populateParentSelect() {
            const select = document.getElementById('parentSelect');
            select.innerHTML = '<option value="">-- Choose Father --</option>';
            Object.values(familyData).forEach(m => {
                select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            });
        }

        function toggleTreeView() {
            showSection('treeView');
            document.getElementById('treeContainer').innerHTML = `<ul>${buildTree("ID-1")}</ul>`;
        }

        function buildTree(id) {
            const m = familyData[id];
            if(!m) return "";
            const kids = Object.values(familyData).filter(c => c.parent === id);
            let html = `<li><a href="javascript:void(0)" onclick="showProfile('${m.id}')">${m.name}</a>`;
            if(kids.length > 0) {
                html += "<ul>" + kids.map(k => buildTree(k.id)).join('') + "</ul>";
            }
            return html + "</li>";
        }

        renderSidebar();
    </script>
