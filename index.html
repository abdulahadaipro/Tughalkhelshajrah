<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tughal Khel Heritage Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        .sidebar { background-color: #1a202c; height: 100vh; position: fixed; width: 300px; overflow-y: auto; color: white; z-index: 50; }
        .main-content { margin-left: 300px; padding: 2rem; min-height: 100vh; }
        .hidden { display: none !important; }
        /* Tree Layout */
        .tree ul { padding-top: 20px; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 20px 5px; }
        .tree li a { border: 1px solid #ccc; padding: 8px 12px; border-radius: 5px; background: white; color: black; display: inline-block; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-tight">TUGHAL <span class="text-blue-400">KHEL</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Digital Heritage Archive</p>
        </div>
        
        <div class="p-4">
            <input type="text" id="searchInput" placeholder="Search lineage..." class="w-full bg-gray-800 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="sidebarList" class="flex-1 px-2 space-y-1 overflow-y-auto">
            </div>

        <div class="p-4 border-t border-gray-700">
            <div id="adminPanel">
                <button onclick="showLoginModal()" id="loginStateBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-xs font-bold transition">
                    <i class="fas fa-user-shield mr-2"></i> ADMIN LOGIN
                </button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <div class="flex items-center space-x-3">
                <button onclick="goBack()" class="text-gray-400 hover:text-blue-600 transition"><i class="fas fa-arrow-left text-xl"></i></button>
                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Archive / <span id="bc-name" class="text-blue-600">Home</span></div>
            </div>
            <div class="flex space-x-2">
                <button onclick="toggleTreeView()" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-100 transition">
                    <i class="fas fa-sitemap mr-2"></i> VISUAL TREE
                </button>
            </div>
        </header>

        <div id="welcomeView" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-12 text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-500 text-3xl">
                <i class="fas fa-vihara"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-4">Tughal Khel Digital Shajrah</h2>
            <p class="text-gray-500 max-w-md mx-auto leading-relaxed">Select a family member from the sidebar to view their full biography, direct descendants, and historical background.</p>
        </div>

        <div id="profileView" class="hidden animate-in fade-in duration-500">
            <div class="bg-white rounded-3xl shadow-md overflow-hidden border border-gray-100">
                <div class="h-32 bg-gradient-to-r from-slate-800 to-slate-900"></div>
                <div class="px-8 pb-8">
                    <div class="relative -mt-12 mb-6 flex justify-between items-end">
                        <div class="p-1 bg-white rounded-2xl shadow-lg">
                            <div id="profInitial" class="w-24 h-24 bg-blue-600 rounded-xl flex items-center justify-center text-3xl font-bold text-white uppercase"></div>
                        </div>
                        <div id="urduNameDisplay" class="text-4xl font-serif text-gray-300">نام</div>
                    </div>
                    
                    <h2 id="engNameDisplay" class="text-4xl font-black text-gray-800 tracking-tight">Name</h2>
                    <p id="relDisplay" class="text-blue-600 font-bold text-xs uppercase tracking-widest mt-1 mb-6">Relation</p>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2">
                            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-3"><i class="fas fa-book-open mr-2"></i> Biography</h3>
                            <div id="bioDisplay" class="text-gray-600 leading-relaxed text-lg bg-gray-50 p-6 rounded-2xl italic"></div>
                        </div>
                        <div>
                            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-3"><i class="fas fa-users mr-2"></i> Descendants</h3>
                            <div id="childList" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="treeView" class="hidden bg-white p-10 rounded-3xl shadow-md overflow-x-auto min-h-[500px]">
            <h3 class="text-center font-black text-gray-800 mb-10 uppercase tracking-widest">Family Lineage Map</h3>
            <div class="tree" id="treeContainer"></div>
        </div>
    </main>

    <script>
        // --- 1. DATA ---
        const familyData = {
            "tk1": { id: "tk1", name: "Tughal Khan", urdu: "طغل خان", rel: "ANCESTOR", bio: "The foundation of the Tughal Khel lineage.", parent: null },
            "shaukat": { id: "shaukat", name: "Shaukat Ali Khan", urdu: "شوکت علی خان", rel: "SON OF TK", bio: "A respected figure in the family history.", parent: "tk1" },
            "abdul": { id: "abdul", name: "Abdul Ahad", urdu: "عبدالواحد", rel: "SON OF SHAUKAT", bio: "Developer of this digital vault.", parent: "shaukat" },
            "anas": { id: "anas", name: "Anas Khan", urdu: "انس خان", rel: "SON OF SHAUKAT", bio: "Member of the Shaukat Ali branch.", parent: "shaukat" },
            "hasnain": { id: "hasnain", name: "Hasnain Khan", urdu: "حنین خان", rel: "SON OF SHAUKAT", bio: "Member of the Shaukat Ali branch.", parent: "shaukat" }
        };

        // --- 2. NAVIGATION & BACK BUTTON ---
        function goBack() {
            document.getElementById('profileView').classList.add('hidden');
            document.getElementById('treeView').classList.add('hidden');
            document.getElementById('welcomeView').classList.remove('hidden');
            document.getElementById('bc-name').innerText = "Home";
        }

        // --- 3. SHOW PROFILE ---
        function showProfile(id) {
            const m = familyData[id];
            if(!m) return;

            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('treeView').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');

            document.getElementById('bc-name').innerText = m.name;
            document.getElementById('engNameDisplay').innerText = m.name;
            document.getElementById('urduNameDisplay').innerText = m.urdu;
            document.getElementById('relDisplay').innerText = m.rel;
            document.getElementById('bioDisplay').innerText = m.bio;
            document.getElementById('profInitial').innerText = m.name.charAt(0);

            // Children Logic
            const cList = document.getElementById('childList');
            cList.innerHTML = "";
            const children = Object.values(familyData).filter(c => c.parent === id);
            
            if(children.length === 0) {
                cList.innerHTML = "<p class='text-gray-400 text-xs italic'>No records found.</p>";
            } else {
                children.forEach(child => {
                    const d = document.createElement('div');
                    d.className = "p-3 bg-gray-50 border border-gray-100 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition";
                    d.onclick = () => showProfile(child.id);
                    d.innerHTML = `<p class='font-bold text-gray-800 text-sm'>${child.name}</p><p class='text-[10px] text-blue-500'>VIEW PROFILE</p>`;
                    cList.appendChild(d);
                });
            }
        }

        // --- 4. ADMIN LOGIN SYSTEM ---
        function showLoginModal() {
            const email = prompt("Enter Admin Email (Optional):");
            const pin = prompt("Enter Secret Pin (Default: 7860):");
            
            if(pin === "7860") {
                alert("Login Successful! Account created for: " + (email || "Admin"));
                document.getElementById('loginStateBtn').innerHTML = `<i class="fas fa-check-circle mr-2"></i> LOGGED IN`;
                document.getElementById('loginStateBtn').className = "w-full bg-green-600 py-2 rounded-lg text-xs font-bold";
            } else {
                alert("Wrong Pin!");
            }
        }

        // --- 5. RENDER SIDEBAR ---
        function renderSidebar(search = "") {
            const list = document.getElementById('sidebarList');
            list.innerHTML = "";
            Object.values(familyData).forEach(m => {
                if(m.name.toLowerCase().includes(search.toLowerCase())) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-xl hover:bg-gray-800 transition group flex items-center space-x-3";
                    btn.onclick = () => showProfile(m.id);
                    btn.innerHTML = `
                        <div class="w-8 h-8 bg-gray-700 rounded-lg flex items-center justify-center text-xs font-bold group-hover:bg-blue-600">${m.name.charAt(0)}</div>
                        <div>
                            <p class="text-xs font-bold">${m.name}</p>
                            <p class="text-[9px] text-gray-500 uppercase">${m.rel}</p>
                        </div>
                    `;
                    list.appendChild(btn);
                }
            });
        }

        // --- 6. TREE LOGIC ---
        function toggleTreeView() {
            document.getElementById('profileView').classList.add('hidden');
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('treeView').classList.remove('hidden');
            const founder = Object.values(familyData).find(f => f.parent === null);
            document.getElementById('treeContainer').innerHTML = `<ul>${buildTree(founder.id)}</ul>`;
        }

        function buildTree(id) {
            const m = familyData[id];
            const kids = Object.values(familyData).filter(c => c.parent === id);
            let h = `<li><a href="#" onclick="showProfile('${m.id}')">${m.name}</a>`;
            if(kids.length > 0) {
                h += "<ul>";
                kids.forEach(k => h += buildTree(k.id));
                h += "</ul>";
            }
            return h + "</li>";
        }

        // Init
        document.getElementById('searchInput').oninput = (e) => renderSidebar(e.target.value);
        renderSidebar();
    </script>
</body>
</html>
