<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tughal Khel | Digital Heritage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
        }
        .glass-sidebar {
            background: rgba(26, 31, 54, 0.95);
            backdrop-filter: blur(10px);
        }
        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .urdu-font {
            direction: rtl;
            font-family: 'Segoe UI', Tahoma;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 10px;
        }
        .sidebar-active {
            background: #2d3748;
            border-left: 4px solid #60a5fa;
        }
        /* Custom file input styling */
        input[type="file"]::file-selector-button {
            background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-right: 15px; font-weight: 600; font-size: 12px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-80 glass-sidebar text-white flex flex-col z-20">
        <div class="p-8 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400 uppercase">Tughal Khel</h1>
            <p class="text-xs text-gray-400 mt-1">EST. 1878 Heritage Vault</p>
        </div>
        
        <div class="p-4 border-b border-gray-800">
            <input type="text" id="sidebarSearch" placeholder="Search member..." class="w-full bg-gray-800 text-sm border border-gray-600 p-3 rounded-lg outline-none focus:border-blue-500 text-white placeholder-gray-400">
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4" id="sidebarList">
            </div>

        <div class="p-4 border-t border-gray-700">
            <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition duration-300 flex items-center justify-center gap-2 font-bold shadow-lg">
                <i class="fas fa-plus-circle"></i> Add New Record
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-10 shadow-sm z-10">
            <div class="text-gray-500 italic text-sm">Lineage: <span id="breadCrumb" class="font-semibold text-gray-700">Select a member to view details</span></div>
            <div class="flex items-center gap-4">
                <span id="dataCount" class="text-xs font-bold text-gray-400 mr-2"></span>
                <span class="text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Verified Archive</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center text-gray-400">
                <i class="fas fa-users text-6xl mb-4 opacity-20"></i>
                <h2 class="text-2xl">Select a Family Branch</h2>
                <p class="mt-2">Click on any name from the sidebar to view their full profile, update records, or manage descendants.</p>
            </div>

            <div id="profileView" class="hidden max-w-4xl mx-auto pb-20">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-8 relative border border-gray-100">
                    <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-800"></div>
                    <div class="px-10 pb-10 relative">
                        <div class="absolute -top-16 left-10">
                            <img id="viewImg" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-2xl border-4 border-white shadow-lg object-cover bg-gray-200">
                        </div>
                        
                        <div class="absolute top-6 right-10 flex gap-2">
                            <button id="editBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-600 p-3 rounded-xl transition shadow-sm" title="Edit Profile">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button id="deleteBtn" class="bg-red-50 hover:bg-red-100 text-red-600 p-3 rounded-xl transition shadow-sm" title="Delete Profile">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>

                        <div class="pt-20">
                            <h2 class="text-4xl font-bold text-gray-800" id="viewEngName">Name</h2>
                            <p class="text-2xl text-gray-500 mt-1 urdu-font" id="viewUrduName">(نام)</p>
                            <p class="mt-4 inline-block text-blue-600 bg-blue-50 px-3 py-1 rounded-md font-semibold uppercase tracking-widest text-xs" id="viewRole">Branch Head</p>
                        </div>
                    </div>
                </div>

                <div id="descendantsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modalTitle" class="font-bold text-lg text-gray-800">Add Family Member</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-8 space-y-5 max-h-[75vh] overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">English Name</label>
                        <input type="text" id="inEng" placeholder="John Doe" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-blue-500 text-gray-700 font-semibold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase block text-right">اردو نام</label>
                        <input type="text" id="inUrdu" placeholder="اردو نام" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-blue-500 urdu-font text-right font-semibold">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase">Lineage / Role</label>
                    <input type="text" id="inLineage" placeholder="e.g. Son of Saeed Khan" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-blue-500">
                </div>

                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div id="imagePreview" class="w-16 h-16 rounded-lg bg-white border border-gray-300 flex items-center justify-center overflow-hidden shadow-sm shrink-0">
                        <i class="fas fa-image text-gray-400 text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase mb-1 block">Profile Photo (PC)</label>
                        <input type="file" id="inPhoto" accept="image/*" class="w-full text-sm text-gray-500">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase">Descendants (Comma separated)</label>
                    <textarea id="inChildren" rows="3" placeholder="e.g. Ali, Raza, Usman" class="w-full border-2 border-gray-200 p-3 rounded-lg outline-none focus:border-blue-500"></textarea>
                </div>

                <button onclick="saveRecord()" id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg transition duration-300 uppercase tracking-wide">
                    Save Record
                </button>
            </div>
        </div>
    </div>

    <script>
        // Seed Data to start with
        const seedData = [
            { 
                id: 1, eng: "Tughal Khan", urdu: "طغل خان", lineage: "Founder (1878)", 
                img: "https://www.w3schools.com/howto/img_avatar.png", 
                sons: ["Bajal (بجل)", "Kamal (کمال)", "Sadrak Khan (صدرک خان)", "Deegan (دیگان)"] 
            },
            { 
                id: 2, eng: "Saeed Khan", urdu: "سعید خان", lineage: "Son of Dost", 
                img: "https://www.w3schools.com/w3images/avatar2.png", 
                sons: ["Khan Badr (خان بدر)", "Khansoba (خانصوبہ)", "Shahbaz (شہباز)", "Pachlag (پچھلاگ)"] 
            }
        ];

        // Database and Global Variables
        let db = JSON.parse(localStorage.getItem('TughalVaultFinal')) || seedData;
        let currentEditId = null;
        let tempImage = "";

        // Image Reader for Local Upload
        document.getElementById('inPhoto').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                tempImage = event.target.result;
                document.getElementById('imagePreview').innerHTML = `<img src="${tempImage}" class="w-full h-full object-cover">`;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // Sidebar Load
        function refreshUI() {
            localStorage.setItem('TughalVaultFinal', JSON.stringify(db));
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';
            
            db.forEach(member => {
                const div = document.createElement('div');
                div.className = 'sidebar-item p-3 mb-2 rounded-xl cursor-pointer hover:bg-gray-800 transition flex items-center gap-3 group border border-transparent hover:border-gray-700';
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold text-blue-400 overflow-hidden shrink-0">
                        ${member.img && member.img !== "https://via.placeholder.com/150" 
                            ? `<img src="${member.img}" class="w-full h-full object-cover">` 
                            : member.eng[0]}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="text-sm font-semibold truncate text-gray-200">${member.eng}</div>
                        <div class="text-[10px] text-gray-500 urdu-font truncate">${member.urdu}</div>
                    </div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('sidebar-active'));
                    div.classList.add('sidebar-active');
                    showProfile(member);
                };
                list.appendChild(div);
            });
            document.getElementById('dataCount').innerText = `${db.length} Records`;
        }

        // Show Profile
        function showProfile(m) {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
            
            document.getElementById('viewEngName').innerText = m.eng;
            document.getElementById('viewUrduName').innerText = `(${m.urdu})`;
            document.getElementById('viewRole').innerText = m.lineage;
            document.getElementById('viewImg').src = m.img || "https://via.placeholder.com/150";
            document.getElementById('breadCrumb').innerText = `Archive / ${m.eng}`;

            // Render Descendants inside Code 1's Card Style
            const container = document.getElementById('descendantsContainer');
            container.innerHTML = `
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm member-card transition duration-300 w-full col-span-1 md:col-span-2">
                    <h4 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4 border-b pb-2">Recorded Descendants</h4>
                    <ul class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${m.sons.length > 0 ? m.sons.map(s => `
                            <li class="text-gray-700 flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100">
                                <i class="fas fa-chevron-right text-[10px] text-gray-300"></i> <span class="font-medium text-sm">${s}</span>
                            </li>
                        `).join('') : '<li class="text-gray-400 text-sm italic p-2">No descendants recorded.</li>'}
                    </ul>
                </div>
            `;

            // Action Buttons Setup
            document.getElementById('editBtn').onclick = () => openModal(m);
            document.getElementById('deleteBtn').onclick = () => {
                if(confirm(`Are you sure you want to delete ${m.eng}'s record?`)) {
                    db = db.filter(x => x.id !== m.id);
                    refreshUI();
                    location.reload(); // Quick reset view
                }
            };
        }

        // Save Data (Create or Update)
        function saveRecord() {
            const eng = document.getElementById('inEng').value;
            const urdu = document.getElementById('inUrdu').value;
            const lineage = document.getElementById('inLineage').value;
            const sonsRaw = document.getElementById('inChildren').value;

            if(!eng || !urdu) return alert("English and Urdu names are required.");

            const data = {
                id: currentEditId || Date.now(),
                eng: eng,
                urdu: urdu,
                lineage: lineage || "Family Member",
                img: tempImage || (currentEditId ? db.find(x => x.id === currentEditId).img : "https://via.placeholder.com/150"),
                sons: sonsRaw ? sonsRaw.split(',').map(s => s.trim()).filter(s => s) : []
            };

            if(currentEditId) {
                const idx = db.findIndex(x => x.id === currentEditId);
                db[idx] = data;
            } else {
                db.unshift(data); // Add to top
            }

            refreshUI();
            closeModal();
            showProfile(data);
        }

        // Modal Controls
        function openModal(member = null) {
            currentEditId = member ? member.id : null;
            document.getElementById('modalTitle').innerText = member ? "Edit Profile" : "Add Family Member";
            document.getElementById('saveBtn').innerText = member ? "Update Record" : "Save Record";
            
            if(member) {
                document.getElementById('inEng').value = member.eng;
                document.getElementById('inUrdu').value = member.urdu;
                document.getElementById('inLineage').value = member.lineage;
                document.getElementById('inChildren').value = member.sons.join(', ');
                tempImage = member.img;
                document.getElementById('imagePreview').innerHTML = member.img && member.img !== "https://via.placeholder.com/150" 
                    ? `<img src="${member.img}" class="w-full h-full object-cover">` 
                    : '<i class="fas fa-image text-gray-400 text-xl"></i>';
            } else {
                document.querySelectorAll('#addModal input[type="text"], #addModal textarea').forEach(i => i.value = '');
                document.getElementById('inPhoto').value = '';
                tempImage = "";
                document.getElementById('imagePreview').innerHTML = '<i class="fas fa-image text-gray-400 text-xl"></i>';
            }
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        // Sidebar Search
        document.getElementById('sidebarSearch').onkeyup = function() {
            const val = this.value.toLowerCase();
            db.forEach((m, i) => {
                const el = document.getElementById('sidebarList').children[i];
                el.style.display = (m.eng.toLowerCase().includes(val) || m.urdu.includes(val)) ? 'flex' : 'none';
            });
        };

        // Initialize
        refreshUI();
    </script>
</body>
</html>
